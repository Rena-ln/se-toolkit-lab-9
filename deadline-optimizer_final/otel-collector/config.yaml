receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

exporters:
  otlphttp/logs:
    endpoint: ${VICTORIALOGS_URL:-http://victorialogs:9428}/insert/otlp

  otlphttp/traces:
    endpoint: ${VICTORIATRACES_URL:-http://victoriatraces:8428}/api/v2/otlp

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces]
